apiVersion: apps/v1
kind: Deployment

metadata:
  name: saiapp

spec:
  replicas: 1

  selector:
    matchLabels:
      app: saiapp

  template:
    metadata:
      labels:
        app: saiapp

    spec:
      containers:
      - name: saiapp
        image: sainathreddycontainer.azurecr.io/saiapp-demo:latest
        ports:
        - containerPort: 8000
        imagePullPolicy: Always
