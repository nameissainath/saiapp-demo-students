name: Build and Deploy to ACR, AKS and Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      IMAGE_TAG: v2

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/cricket-api:${{ env.IMAGE_TAG }} .
          docker tag ${{ secrets.ACR_LOGIN_SERVER }}/cricket-api:${{ env.IMAGE_TAG }} \
            ${{ secrets.ACR_LOGIN_SERVER }}/cricket-api:latest

      - name: Push image to ACR
        run: |
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/cricket-api:${{ env.IMAGE_TAG }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/cricket-api:latest

      - name: Connect kubectl to AKS
        run: |
          az aks get-credentials \
            --resource-group ${{ secrets.AKS_RESOURCE_GROUP }} \
            --name ${{ secrets.AKS_CLUSTER_NAME }} \
            --overwrite-existing

      - name: Deploy to AKS
        run: |
          sed -i "s|cricket-api:.*|cricket-api:${{ env.IMAGE_TAG }}|" aks/deployment.yaml
          kubectl apply -f aks/deployment.yaml
          kubectl apply -f aks/service.yaml
          kubectl apply -f aks/hpa.yaml

      - name: Verify rollout
        run: kubectl rollout status deployment/cricket-api --timeout=180s

      - name: Deploy to Azure Web App
        run: |
          az webapp config container set \
            --name ${{ secrets.AZURE_WEBAPP_NAME }} \
            --resource-group ${{ secrets.AKS_RESOURCE_GROUP }} \
            --docker-custom-image-name ${{ secrets.ACR_LOGIN_SERVER }}/cricket-api:${{ env.IMAGE_TAG }}

          az webapp restart \
            --name ${{ secrets.AZURE_WEBAPP_NAME }} \
            --resource-group ${{ secrets.AKS_RESOURCE_GROUP }}

      - name: Verify Web App
        run: |
          echo "Web App URL: https://${{ secrets.AZURE_WEBAPP_HOSTNAME }}"
          curl --fail --retry 5 --retry-delay 10 \
            "https://${{ secrets.AZURE_WEBAPP_HOSTNAME }}/"
